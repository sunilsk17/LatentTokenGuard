# =====================================================
# LatentTokenGuard Configuration
# =====================================================

# --- Model Settings ---
models:
  phi3:
    id: "microsoft/Phi-3.5-vision-instruct"
    dtype: "bfloat16"      # Use bfloat16 to save memory (prevents OOM on Mac)/ we used float32 -> out of memory and float16
    device: "auto"         # "cpu" | "cuda" | "auto"
    trust_remote_code: true
    max_new_tokens: 12
    do_sample: false
    temperature: 1.0

  llava:
    id: "llava-hf/llava-1.5-7b-hf"
    dtype: "float16"       # Use float16 to save memory
    device: "auto"
    trust_remote_code: false
    load_in_4bit: true
    max_new_tokens: 12
    do_sample: false
    temperature: 1.0

# --- Detection Settings ---
detection:
  threshold: 0.5            # Hallucination score threshold (tune on val set)
  alpha: 0.7                # Weight for alignment score
  beta: 0.3                 # Weight for logit contrast score
  use_logit_contrast: false # Set true to enable Module 4 (doubles inference time)
  use_token_filter: true    # Use spaCy to filter content tokens
  hidden_layer_index: -1    # -1 = last hidden layer; -2 = second to last
  normalize_embeddings: true

# --- Dataset Paths ---
data:
  pope:
    hf_repo: "lmms-lab/POPE"
    splits:
      - "adversarial"
      - "popular"
      - "random"
    default_split: "adversarial"

  mmhal:
    hf_repo: "Shengcao1006/MMHal-Bench"

  coco:
    images_dir: "./data/coco/val2017"
    annotations_file: "./data/coco/annotations/instances_val2017.json"
    indoor_categories:
      - "chair"
      - "couch"
      - "potted plant"
      - "bed"
      - "dining table"
      - "toilet"
      - "tv"
      - "laptop"
      - "mouse"
      - "remote"
      - "keyboard"
      - "cell phone"
      - "microwave"
      - "oven"
      - "toaster"
      - "sink"
      - "refrigerator"
      - "book"
      - "clock"
      - "vase"
      - "scissors"
    samples_per_category: 20   # How many yes/no pairs to generate per category
    positive_ratio: 0.5        # Fraction of "yes" (object present) samples

# --- Experiment Settings ---
experiments:
  output_dir: "./results"
  cache_dir: "./cache"
  seed: 42
  n_samples: null             # null = use all; int = limit for quick testing

# --- LoRA Fine-tuning (Optional) ---
lora:
  r: 8                        # LoRA rank
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  max_steps: 500
  batch_size: 1
  learning_rate: 2e-4
  training_data: "./data/lora_train.json"   # Custom VQA pairs for fine-tuning

# --- Logging ---
logging:
  level: "INFO"
  save_predictions: true
  save_embeddings: false      # Set true to cache embeddings (saves disk space if false)
